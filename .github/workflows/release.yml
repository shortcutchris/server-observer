name: Signed Release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Existing release tag (for example v0.2.0)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ inputs.tag }}

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          CERTIFICATE_BASE64: ${{ secrets.MACOS_CERTIFICATE_BASE64 }}
          CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.MACOS_KEYCHAIN_PASSWORD }}
        run: |
          CERTIFICATE_PATH="$RUNNER_TEMP/developer-id.p12"
          KEYCHAIN_PATH="$RUNNER_TEMP/server-observer.keychain-db"
          echo "$CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"

      - name: Build signed release
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          BUILD_NUMBER="$(sed -n 's/^[[:space:]]*CURRENT_PROJECT_VERSION:[[:space:]]*//p' project.yml | head -1)"
          test -n "$BUILD_NUMBER"
          scripts/build_release.sh "$VERSION" "$BUILD_NUMBER"

      - name: Notarize and staple
        env:
          API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}
          API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          API_KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          echo "$API_KEY_BASE64" | base64 --decode > "$API_KEY_PATH"
          NOTARY_RESULT="$(xcrun notarytool submit "dist/ServerObserver-$VERSION.zip" \
            --key "$API_KEY_PATH" \
            --key-id "$API_KEY_ID" \
            --issuer "$API_ISSUER_ID" \
            --wait \
            --output-format json)"
          echo "$NOTARY_RESULT"
          test "$(echo "$NOTARY_RESULT" | plutil -extract status raw -o - -- -)" = "Accepted"
          xcrun stapler staple dist/ServerObserver.app
          xcrun stapler validate dist/ServerObserver.app
          xattr -cr dist/ServerObserver.app
          xcrun stapler validate dist/ServerObserver.app
          rm "dist/ServerObserver-$VERSION.zip"
          ditto -c -k --sequesterRsrc --keepParent \
            dist/ServerObserver.app "dist/ServerObserver-$VERSION.zip"

      - name: Generate signed Sparkle appcast
        env:
          SPARKLE_PRIVATE_KEY: ${{ secrets.SPARKLE_PRIVATE_KEY }}
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          TOOLS=".build/ReleaseDerivedData/SourcePackages/artifacts/sparkle/Sparkle/bin"
          mkdir release-feed
          cp "dist/ServerObserver-$VERSION.zip" release-feed/
          cp appcast.xml release-feed/appcast.xml
          NOTES_SOURCE="release-notes/$VERSION.md"
          if [[ -f "$NOTES_SOURCE" ]]; then
            cp "$NOTES_SOURCE" "release-feed/ServerObserver-$VERSION.md"
          else
            printf '# Server Observer %s\n\nNeue Version von Server Observer.\n' "$VERSION" \
              > "release-feed/ServerObserver-$VERSION.md"
          fi
          echo "$SPARKLE_PRIVATE_KEY" | "$TOOLS/generate_appcast" \
            --ed-key-file - \
            --download-url-prefix "https://github.com/shortcutchris/server-observer/releases/download/${{ inputs.tag }}/" \
            --release-notes-url-prefix "https://github.com/shortcutchris/server-observer/releases/download/${{ inputs.tag }}/" \
            --link "https://github.com/shortcutchris/server-observer" \
            -o release-feed/appcast.xml \
            release-feed
          cp release-feed/appcast.xml "$RUNNER_TEMP/appcast.xml"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ inputs.tag }}"
          VERSION="${VERSION#v}"
          if gh release view "${{ inputs.tag }}" >/dev/null 2>&1; then
            gh release upload "${{ inputs.tag }}" \
              "dist/ServerObserver-$VERSION.zip" \
              "release-feed/ServerObserver-$VERSION.md" \
              --clobber
            gh release edit "${{ inputs.tag }}" \
              --title "Server Observer $VERSION" \
              --notes-file "release-feed/ServerObserver-$VERSION.md"
          else
            gh release create "${{ inputs.tag }}" \
              "dist/ServerObserver-$VERSION.zip" \
              "release-feed/ServerObserver-$VERSION.md" \
              --title "Server Observer $VERSION" \
              --notes-file "release-feed/ServerObserver-$VERSION.md"
          fi

      - name: Publish appcast on main
        run: |
          git fetch origin main
          git checkout main
          cp "$RUNNER_TEMP/appcast.xml" appcast.xml
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add appcast.xml
          git diff --cached --quiet || git commit -m "Update appcast for ${{ inputs.tag }} [skip ci]"
          git push origin main
