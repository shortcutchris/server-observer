name: ServerObserver
options:
  bundleIdPrefix: dev.serverobserver
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "26.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_STYLE: Automatic
    GENERATE_INFOPLIST_FILE: YES
    ENABLE_HARDENED_RUNTIME: YES
    CODE_SIGN_ENTITLEMENTS: ServerObserver/ServerObserver.entitlements
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    exactVersion: 2.9.2
targets:
  ServerObserver:
    type: application
    platform: macOS
    sources:
      - path: ServerObserver
        excludes:
          - Info.plist
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.serverobserver.app
        PRODUCT_NAME: ServerObserver
        MARKETING_VERSION: 0.3.2
        CURRENT_PROJECT_VERSION: 6
        GENERATE_INFOPLIST_FILE: NO
        INFOPLIST_FILE: ServerObserver/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Release:
          CODE_SIGN_ENTITLEMENTS: ServerObserver/ServerObserverRelease.entitlements
          CODE_SIGN_INJECT_BASE_ENTITLEMENTS: NO
    dependencies:
      - package: Sparkle
    scheme:
      testTargets:
        - ServerObserverTests
  ServerObserverTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: ServerObserverTests
    dependencies:
      - target: ServerObserver
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.serverobserver.tests
        GENERATE_INFOPLIST_FILE: YES
